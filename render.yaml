services:
  - type: web
    name: grac-compliance
    runtime: docker
    repo: https://github.com/cycy4016-star/grac_project
    plan: free
    healthCheckPath: /
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: nvidia
      - key: EMBEDDING_API_MODEL
        value: nvidia/nv-embed-v1
      - key: LLM_PROVIDER
        value: auto
      - key: ACTIVE_SECTOR
        value: cybersecurity
      - key: ENABLE_MULTI_SECTOR
        value: "False"
      - key: MONITOR_ENABLED
        value: "False"
      - key: MIN_RETRIEVAL_CONFIDENCE
        value: "0.6"
      - key: MIN_ANSWER_CONFIDENCE
        value: "0.7"
      - key: API_DEBUG
        value: "False"
